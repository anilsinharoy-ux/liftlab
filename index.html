<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1E5080" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="LiftLab" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>LiftLab</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- App Shell -->
  <div id="app">

    <!-- Top Header -->
    <header id="top-header">
      <span id="header-title">LiftLab</span>
      <span id="header-week-badge">Week A</span>
    </header>

    <!-- Screen Container (pages swap in here) -->
    <main id="screen-container">
      <!-- Screens are injected by JavaScript -->
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
      <div id="bottom-nav-inner">
        <button class="nav-btn active" data-tab="home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
            <path d="M9 21V12h6v9"/>
          </svg>
          <span>Home</span>
        </button>
        <button class="nav-btn" data-tab="workout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="12" x2="16" y2="12"/>
            <line x1="5.5" y1="9.5" x2="5.5" y2="14.5"/>
            <line x1="18.5" y1="9.5" x2="18.5" y2="14.5"/>
            <line x1="3.5" y1="10.5" x2="3.5" y2="13.5"/>
            <line x1="20.5" y1="10.5" x2="20.5" y2="13.5"/>
            <line x1="5.5" y1="9.5" x2="8" y2="9.5"/>
            <line x1="5.5" y1="14.5" x2="8" y2="14.5"/>
            <line x1="16" y1="9.5" x2="18.5" y2="9.5"/>
            <line x1="16" y1="14.5" x2="18.5" y2="14.5"/>
          </svg>
          <span>Workout</span>
        </button>
        <button class="nav-btn" data-tab="supps">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="9" width="18" height="6" rx="3"/>
            <line x1="12" y1="9" x2="12" y2="15"/>
          </svg>
          <span>Supps</span>
        </button>
        <button class="nav-btn" data-tab="progress">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span>Progress</span>
        </button>
      </div>
    </nav>

  </div>

  <script src="js/app.js"></script>
</body>
</html>
